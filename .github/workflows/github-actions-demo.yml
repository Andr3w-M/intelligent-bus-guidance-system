name: GitHub Actions Test
run-name: Testing Github Actions
on: [push]
jobs:
  java-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'adopt'
          
      - name: Run Tests
        run: mvn test
